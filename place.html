<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Place Details - TripExplorer</title>
  <link rel="stylesheet" href="STYLECSS/style.css">
</head>

<body>

<header class="navbar">
  <div class="logo">🌍 TripExplorer</div>
  <div class="auth">
    <a href="index.html">Home</a>
  </div>
</header>

<div class="container">

  <!-- Place Banner Image -->
  <img id="placeImage" src="" alt="Place Image" class="place-hero-img">

  <!-- Place Info -->
  <div class="place-info">
    <span id="placeCategory" class="badge"></span>
    <h1 id="placeName"></h1>
    <p id="placeLocation" class="place-meta"></p>
    <p id="placeRating" class="place-meta"></p>
    <p id="placeDescription" class="place-desc"></p>
  </div>

  <!-- Reviews Section -->
  <div class="section-divider">
    <h3>Reviews</h3>
    <div id="reviews"></div>
  </div>

  <!-- Add Review -->
  <div class="add-review-box">
    <h3>Add Your Review</h3>
    <textarea id="comment" placeholder="Share your experience..."></textarea>
    <div class="rating-row">
      <label>Rating (1–5):</label>
      <input id="rating" type="number" min="1" max="5" placeholder="e.g. 4">
    </div>
    <button onclick="addReview()">Submit Review</button>
  </div>

</div>

<script src="js/data.js"></script>
<script src="js/place.js"></script>

</body>
</html>
